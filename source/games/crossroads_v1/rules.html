<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crossroads — Rules</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #f8f5ef; color: #222; }
    #rules-container {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px 20px 40px;
      font-family: -apple-system, system-ui, sans-serif;
      line-height: 1.5;
    }
    #rules-container h1 { font-size: 1.4rem; margin: 0 0 12px; }
    #rules-container h2 { font-size: 1.05rem; margin: 1.5em 0 .4em; color: #2b3a52; }
    #rules-container h3 { font-size: .95rem; margin: 1em 0 .3em; color: #4a6080; }
    #rules-container p, #rules-container li { font-size: .9rem; }
    #rules-container table {
      border-collapse: collapse;
      margin: 8px 0;
      font-size: .82rem;
      width: 100%;
    }
    #rules-container th, #rules-container td {
      padding: 4px 8px;
      border: 1px solid #d0c8ae;
      text-align: left;
    }
    #rules-container th { background: #eee8d6; font-weight: 700; }
    #rules-container code {
      background: #eee8d6;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: .85em;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 12px;
      background: #2b3a52;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-size: .85rem;
    }
    .back-link:hover { background: #4a6080; }
  </style>
</head>
<body>
  <div id="rules-container">
    <a href="index.html" class="back-link">← Back to game</a>
    <div id="content">Loading rules…</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    fetch("2P_Web_Rules.md")
      .then((r) => r.text())
      .then((text) => {
        document.getElementById("content").innerHTML = marked.parse(text);
      })
      .catch((err) => {
        document.getElementById("content").textContent = "Failed to load rules: " + err;
      });
  </script>
</body>
</html>
